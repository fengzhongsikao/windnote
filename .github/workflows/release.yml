name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: windnote-darwin-universal
            upload_path: build/bin/windnote-darwin-universal.zip

          - os: windows-latest
            platform: windows/amd64
            artifact_name: windnote-windows-amd64
            upload_path: build/bin/windnote-windows-amd64.zip

          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: windnote-linux-amd64
            upload_path: build/bin/windnote-linux-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Inject version from tag
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "Release version: $TAG_VERSION"
          sed -i '' "s/return \"[0-9.]*\"/return \"$TAG_VERSION\"/" app.go || \
          sed -i "s/return \"[0-9.]*\"/return \"$TAG_VERSION\"/" app.go

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cd build/bin && zip -ry windnote-darwin-universal.zip windnote.app

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build/bin
          Compress-Archive -Path * -DestinationPath windnote-windows-amd64.zip

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cd build/bin && tar czf windnote-linux-amd64.tar.gz windnote

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
